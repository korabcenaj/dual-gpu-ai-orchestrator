apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  REDIS_URL: redis://redis:6379/0
  CORS_ORIGINS: http://localhost:5173,http://localhost:80
  REDIS_EXPORTER_ADDR: redis://redis:6379

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  POSTGRES_USER: orchestrator
  POSTGRES_PASSWORD: orchestrator
  POSTGRES_DB: orchestrator
  DATABASE_URL_ASYNC: postgresql+asyncpg://orchestrator:orchestrator@postgres:5432/orchestrator
  DATABASE_URL_SYNC: postgresql+psycopg2://orchestrator:orchestrator@postgres:5432/orchestrator
  DATA_SOURCE_NAME: postgresql://orchestrator:orchestrator@postgres:5432/orchestrator?sslmode=disable
  GRAFANA_PASSWORD: admin
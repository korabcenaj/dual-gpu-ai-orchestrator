version: "3.9"

x-common-env: &common-env
  REDIS_URL: redis://redis:6379/0
  DATABASE_URL: postgresql+asyncpg://orchestrator:orchestrator@postgres:5432/orchestrator

services:
  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: orchestrator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./services/api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://orchestrator:orchestrator@postgres:5432/orchestrator
      CORS_ORIGINS: "http://localhost:5173,http://localhost:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dispatch-worker:
    build:
      context: ./services/api-gateway
    restart: unless-stopped
    command: celery -A worker worker --queues=dispatch --concurrency=1 --loglevel=info
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+asyncpg://orchestrator:orchestrator@postgres:5432/orchestrator
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ── Vision Worker (Intel iGPU — /dev/dri/renderD128) ────────────────────────
  vision-worker:
    build:
      context: ./services/vision-service
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg2://orchestrator:orchestrator@postgres:5432/orchestrator
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128   # Intel HD 530
    group_add:
      - render
      - video
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - vision_models:/app/models

  # ── LLM Worker (AMD WX 3100 — /dev/dri/renderD129) ──────────────────────────
  llm-worker:
    build:
      context: ./services/llm-service
    restart: unless-stopped
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg2://orchestrator:orchestrator@postgres:5432/orchestrator
      LLM_GPU_LAYERS: "35"
    devices:
      - /dev/dri/renderD129:/dev/dri/renderD129   # AMD Radeon PRO WX 3100
    group_add:
      - render
      - video
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - llm_models:/app/models

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"

  # ── Grafana ───────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.3.2
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana

  # ── Redis Exporter ───────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      - redis

  # ── Postgres Exporter ────────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://orchestrator:orchestrator@postgres:5432/orchestrator?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  vision_models:
  llm_models:
